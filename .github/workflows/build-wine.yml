name: Build Wine for Android (GameHub format)

on:
  workflow_dispatch:
    inputs:
      wine_version:
        description: 'Wine version to build (e.g. 11.0, 11.1, 10.0)'
        required: true
        default: '11.0'
      framework:
        description: 'Target framework'
        required: true
        type: choice
        options:
          - x64
          - arm64x
          - both
        default: 'both'
      upload_release:
        description: 'Upload to Containers release when done'
        required: true
        type: boolean
        default: true

env:
  WINE_VERSION: ${{ inputs.wine_version }}
  NDK: /usr/local/lib/android/sdk/ndk/27.3.13750724
  API_LEVEL: 28
  FREETYPE_VERSION: 2.13.3
  # wine_10.0 sub_data used as prefix template (has registry hives + symlinks)
  WINE10_SUB_URL: https://github.com/The412Banner/bannerhub-api/releases/download/Components/66e25e9a8fde74e8feb4e3b2ba9f6201.tzst

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build host Wine (native Linux) — provides wrc, widl, winebuild tools
  # needed for cross-compilation. Artifact is the build directory.
  # ──────────────────────────────────────────────────────────────────────────
  build-host-tools:
    runs-on: ubuntu-24.04

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            flex bison gettext gcc g++ make pkg-config \
            gcc-mingw-w64-x86-64 gcc-mingw-w64-i686 \
            libgnutls28-dev libunwind-dev \
            libfreetype-dev \
            mingw-w64-tools

      - name: Cache host Wine tools build dir
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: build-host
          key: wine-host-tools-${{ env.WINE_VERSION }}-v8

      - name: Download Wine source
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          wget -q "https://dl.winehq.org/wine/source/${WINE_VERSION%%.*}.0/wine-${WINE_VERSION}.tar.xz"
          tar -xf "wine-${WINE_VERSION}.tar.xz"

      - name: Build host Wine tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p build-host
          cd build-host
          ../wine-${WINE_VERSION}/configure \
            --enable-win64 \
            --without-x \
            --disable-tests
          make -j$(nproc) __tooldeps__
          # Copy locale.nls from Wine source — it's pre-generated in the tarball.
          # wrc needs WINE_BUILD_DIR/nls/locale.nls when compiling .rc files.
          mkdir -p nls
          cp ../wine-${WINE_VERSION}/nls/locale.nls nls/locale.nls

      - name: Upload host tools artifact
        # Upload build-host/ directory — --with-wine-tools needs tools/widl/widl etc.
        # Includes nls/locale.nls so wrc can find it via WINE_BUILD_DIR=/opt/wine-host
        uses: actions/upload-artifact@v4
        with:
          name: wine-host-tools
          path: build-host
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # Build X64: x86_64-linux-android (runs via Box64/FEX on device)
  # Uses X11 backend (winex11.so) — Box64 wraps libX11 from imagefs at runtime
  # ──────────────────────────────────────────────────────────────────────────
  build-x64:
    runs-on: ubuntu-24.04
    needs: build-host-tools
    if: inputs.framework == 'x64' || inputs.framework == 'both'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            flex bison gettext make pkg-config libtool \
            gcc gcc-multilib g++ g++-multilib \
            gcc-mingw-w64-x86-64 gcc-mingw-w64-i686 \
            mingw-w64-tools \
            libx11-dev libxext-dev \
            zstd

      - name: Download Wine source
        run: |
          wget -q "https://dl.winehq.org/wine/source/${WINE_VERSION%%.*}.0/wine-${WINE_VERSION}.tar.xz"
          tar -xf "wine-${WINE_VERSION}.tar.xz"

      - name: Download host tools artifact
        uses: actions/download-artifact@v4
        with:
          name: wine-host-tools
          path: /opt/wine-host

      - name: Fix host tools permissions
        # Artifacts don't preserve execute bits — restore them
        run: chmod -R +x /opt/wine-host/tools

      - name: Set up Android NDK toolchain (x86_64)
        run: |
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN/bin/x86_64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/x86_64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> $GITHUB_ENV
          $TOOLCHAIN/bin/x86_64-linux-android${API_LEVEL}-clang --version

      - name: Create Android x86_64 stubs for X11 libraries
        # Box64 wraps libX11/libXext at runtime from imagefs — we just need
        # stubs for link-time symbol resolution during Wine build.
        # We copy only X11/ headers to /opt/android-x11-stubs/include/ so that
        # --x-includes points there instead of /usr/include, preventing Ubuntu
        # glibc headers (features-time64.h, bits/wordsize.h, etc.) from polluting
        # the Android NDK compiler's include path.
        run: |
          mkdir -p /opt/android-x11-stubs/include
          cp -r /usr/include/X11 /opt/android-x11-stubs/include/
          NDK_CC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android${API_LEVEL}-clang"

          python3 << 'PYEOF'
          import subprocess, os, glob

          ndk_cc = os.environ['NDK'] + f'/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android{os.environ["API_LEVEL"]}-clang'

          def make_stub(host_lib_pattern, soname, out_path):
              # Find host library
              candidates = glob.glob(host_lib_pattern)
              host_lib = None
              for c in candidates:
                  if os.path.exists(c):
                      host_lib = c
                      break
              if not host_lib:
                  print(f'WARNING: host lib not found for {soname}, creating minimal stub')
                  symbols = ['XOpenDisplay']
              else:
                  result = subprocess.run(['nm', '-D', '--defined-only', host_lib],
                                        capture_output=True, text=True)
                  symbols = set()
                  for line in result.stdout.split('\n'):
                      parts = line.strip().split()
                      if len(parts) >= 3 and parts[-2] in ('T', 'W'):
                          sym = parts[-1]
                          # Keep only C symbols (no C++ mangling)
                          if not sym.startswith('_ZN') and not sym.startswith('_Z'):
                              symbols.add(sym)
                  print(f'Found {len(symbols)} symbols in {host_lib}')

              # Generate assembly stub (avoids C type issues)
              stub_s = f'/tmp/stub_{soname}.s'
              with open(stub_s, 'w') as f:
                  for sym in sorted(symbols):
                      f.write(f'.global {sym}\n')
                      f.write(f'.type {sym}, @function\n')
                      f.write(f'{sym}:\n')
                      f.write(f'  ret\n\n')

              result = subprocess.run([ndk_cc, '-shared', '-fPIC',
                                      f'-Wl,-soname,{soname}',
                                      '-o', out_path, stub_s],
                                     capture_output=True, text=True)
              if result.returncode == 0:
                  print(f'Created {out_path}: {os.path.getsize(out_path)} bytes')
              else:
                  print(f'ERROR: {result.stderr[:300]}')
                  raise RuntimeError(f'Failed to create stub for {soname}')

          make_stub('/usr/lib/x86_64-linux-gnu/libX11.so*',
                    'libX11.so', '/opt/android-x11-stubs/libX11.so')
          make_stub('/usr/lib/x86_64-linux-gnu/libXext.so*',
                    'libXext.so', '/opt/android-x11-stubs/libXext.so')
          PYEOF

          # Create pkg-config files for Wine configure
          mkdir -p /opt/android-x11-stubs/pkgconfig
          printf 'prefix=/opt/android-x11-stubs\nexec_prefix=${prefix}\nlibdir=${exec_prefix}\nincludedir=/usr/include\n\nName: X11\nDescription: X Library stub for Android NDK cross-compilation\nVersion: 1.8.0\nLibs: -L${libdir} -lX11\nCflags: -I${includedir}\n' \
            > /opt/android-x11-stubs/pkgconfig/x11.pc
          printf 'prefix=/opt/android-x11-stubs\nexec_prefix=${prefix}\nlibdir=${exec_prefix}\nincludedir=/usr/include\n\nName: Xext\nDescription: Misc X Extension Library stub for Android NDK cross-compilation\nVersion: 1.3.5\nRequires: x11\nLibs: -L${libdir} -lXext\nCflags: -I${includedir}\n' \
            > /opt/android-x11-stubs/pkgconfig/xext.pc
          echo "X11 stubs created:"
          ls -la /opt/android-x11-stubs/

      - name: Build FreeType for Android x86_64
        run: |
          wget -q "https://download.savannah.gnu.org/releases/freetype/freetype-${FREETYPE_VERSION}.tar.xz" || \
            wget -q "https://sourceforge.net/projects/freetype/files/freetype2/${FREETYPE_VERSION}/freetype-${FREETYPE_VERSION}.tar.xz/download" \
              -O "freetype-${FREETYPE_VERSION}.tar.xz"
          tar xf "freetype-${FREETYPE_VERSION}.tar.xz"
          mkdir freetype-build && cd freetype-build
          ../freetype-${FREETYPE_VERSION}/configure \
            --host=x86_64-linux-android \
            --prefix=/opt/freetype-x64 \
            --without-zlib \
            --without-bzip2 \
            --without-png \
            --without-harfbuzz \
            --without-brotli \
            CC="$CC" \
            AR="$AR" \
            RANLIB="$RANLIB"
          make -j$(nproc)
          sudo make install
          echo "FREETYPE_CFLAGS=-I/opt/freetype-x64/include/freetype2" >> $GITHUB_ENV
          echo "FREETYPE_LIBS=-L/opt/freetype-x64/lib -lfreetype" >> $GITHUB_ENV

      - name: Patch Wine source for Android NDK compilation
        run: |
          python3 << 'PYEOF'
          import re, os

          ver_local = os.environ.get('WINE_VERSION', '11.0')

          # --- server/thread.c: add sched.h for cpu_set_t ---
          # Android NDK configure detection doesn't find sched.h during cross-compile,
          # so cpu_set_t / CPU_ZERO / CPU_SET are undeclared.
          tc = f'wine-{ver_local}/server/thread.c'
          try:
              c = open(tc).read()
              if 'cpu_set_t' in c and '<sched.h>' not in c:
                  # Inject after first #include line
                  p = re.sub(r'(#include\s+[<"][^\n]+\n)',
                             r'\1#include <sched.h>  /* Android NDK: cpu_set_t */\n',
                             c, count=1)
                  open(tc, 'w').write(p)
                  print('Patched server/thread.c: added sched.h for cpu_set_t')
              else:
                  print('server/thread.c: sched.h already present or no cpu_set_t usage')
          except Exception as e:
              print(f'Error patching server/thread.c: {e}')

          # --- wineandroid.drv/android.h: remove BOOL fullscreen parameter ---
          # In Wine 11.0, window.c removed BOOL fullscreen from ANDROID_WindowPosChanged
          # but android.h still declares it with that parameter, causing a conflicting
          # types error. Remove it from the header to match the implementation.
          ah = f'wine-{ver_local}/dlls/wineandroid.drv/android.h'
          try:
              c = open(ah).read()
              orig = c
              c = re.sub(r',\s*BOOL\s+fullscreen\b', '', c)
              if c != orig:
                  open(ah, 'w').write(c)
                  print('Patched android.h: removed BOOL fullscreen parameter')
              else:
                  print('android.h: BOOL fullscreen not found (OK)')
          except Exception as e:
              print(f'Error patching android.h: {e}')
          PYEOF

      - name: Configure Wine (x64 Android — X11 backend)
        run: |
          mkdir build-x64 && cd build-x64
          ../wine-${WINE_VERSION}/configure \
            --host=x86_64-linux-android \
            --with-wine-tools=/opt/wine-host \
            --enable-win64 \
            --with-x \
            --x-includes=/opt/android-x11-stubs/include \
            --x-libraries=/opt/android-x11-stubs \
            --without-xcomposite \
            --without-xfixes \
            --without-xinerama \
            --without-xinput \
            --without-xinput2 \
            --without-xrandr \
            --without-xrender \
            --without-xshape \
            --without-xshm \
            --without-xxf86vm \
            --without-wayland \
            --without-dbus \
            --without-pulse \
            --without-alsa \
            --without-cups \
            --without-sane \
            --without-v4l2 \
            --without-opencl \
            --without-pcap \
            --without-netapi \
            --without-krb5 \
            --without-capi \
            --disable-tests \
            --prefix=/tmp/wine-x64-out \
            CC="$CC" \
            CXX="$CXX" \
            AR="$AR" \
            RANLIB="$RANLIB" \
            CROSSCC="x86_64-w64-mingw32-gcc" \
            CROSSCXX="x86_64-w64-mingw32-g++" \
            FREETYPE_CFLAGS="$FREETYPE_CFLAGS" \
            FREETYPE_LIBS="$FREETYPE_LIBS" \
            CFLAGS="-D_GNU_SOURCE -include strings.h -Wno-implicit-function-declaration -Wno-incompatible-function-pointer-types -Wno-int-conversion" \
            CROSSCFLAGS="-Wno-implicit-function-declaration -Wno-incompatible-function-pointer-types -Wno-int-conversion" \
            LDFLAGS="-L/opt/android-x11-stubs -Wl,--allow-shlib-undefined"

      - name: Patch generated Makefile (x64)
        run: |
          # winex11.so (and other unix-side .so files) may have symbols from libX11/libXext
          # that are unresolved at link time (provided by Box64/imagefs at runtime).
          # Remove -Wl,-z,defs globally from the generated Makefile to allow undefined symbols.
          # Also remove wine-debug.apk target — gradle/jcenter is broken (jcenter shutdown).
          python3 << 'PYEOF'
          import re
          mf = 'build-x64/Makefile'
          c = open(mf).read()
          orig = c
          # Remove -Wl,-z,defs
          c = re.sub(r'\s*-Wl,-z,defs\b', '', c)
          # Remove wine-debug.apk as a dependency/target anywhere in Makefile
          c = re.sub(r'\s*dlls/wineandroid\.drv/wine-debug\.apk\b', '', c)
          if c != orig:
              open(mf, 'w').write(c)
              print(f'Patched build-x64/Makefile: -Wl,-z,defs + wine-debug.apk removed')
          else:
              print('build-x64/Makefile: nothing to patch (OK)')
          PYEOF

      - name: Build Wine (x64)
        env:
          # Tell wrc where to find nls/locale.nls from the downloaded host tools
          WINE_BUILD_DIR: /opt/wine-host
        run: |
          cd build-x64
          make -j$(nproc)

      - name: Install Wine (x64)
        run: |
          cd build-x64
          make install
          cd ..

          echo "=== build-x64/loader contents ==="
          ls -la build-x64/loader/ 2>/dev/null | head -30 || echo "loader dir missing"
          echo "=== build-x64/server contents ==="
          ls -la build-x64/server/ 2>/dev/null | head -10 || echo "server dir missing"
          echo "=== x86_64-unix libs (install prefix) ==="
          ls /tmp/wine-x64-out/x86_64/lib/wine/x86_64-unix/ 2>/dev/null | head -10 || echo "missing"

          # Wine installs to $prefix/x86_64/ (multiarch layout for --enable-win64).
          # make install does NOT install the wine/wineserver ELF loader to x86_64/bin/
          # (it installs them to x86_64/lib/wine/x86_64-unix/ instead, and creates
          # shell-script symlinks in bin/). Copy the real NDK ELF manually.
          INST_BIN=/tmp/wine-x64-out/x86_64/bin
          mkdir -p "$INST_BIN"

          for candidate in build-x64/loader/wine build-x64/loader/wine64; do
            if [[ -f "$candidate" ]]; then
              cp "$candidate" "$INST_BIN/wine"
              echo "Installed $candidate → $INST_BIN/wine"
              file "$INST_BIN/wine" || true
              break
            fi
          done

          for candidate in build-x64/server/wineserver; do
            if [[ -f "$candidate" ]]; then
              cp "$candidate" "$INST_BIN/wineserver"
              echo "Installed $candidate → $INST_BIN/wineserver"
            fi
          done

          echo "=== $INST_BIN ==="
          ls -la "$INST_BIN/" 2>/dev/null || echo "(empty)"

      - name: Configure Wine (i386 PE DLLs — WoW64 support)
        # Build 32-bit Windows PE DLLs (i386-windows) using Wine's new-wow64 architecture.
        # --with-wine64 hooks into the already-built x64 tree; only PE DLLs are built
        # (no unix-side for i386 in new-wow64). Working containers (wine 9.13) have 721
        # i386-windows DLLs — without them wineboot exits immediately after X11 window.
        # CC=gcc overrides the inherited NDK clang — no unix-side cross-compile needed.
        # The x64 build used --with-wine-tools=/opt/wine-host so build-x64/tools/ has
        # stubs, not real tools. Symlink host tools into build-x64/tools/ so that
        # --with-wine64=../build-x64 can find widl/winebuild/wrc.
        run: |
          # --with-wine64=../build-x64 checks for tools/winebuild/winebuild and
          # tools/widl/widl as actual executables.
          # make __tooldeps__ only built .o files in these subdirs, not final binaries.
          # Build them explicitly from the host artifact (native Linux gcc).
          echo "Building widl and winebuild executables in host tools..."
          make -C /opt/wine-host tools/widl/widl tools/winebuild/winebuild 2>&1 | tail -5
          echo "widl: $(ls -la /opt/wine-host/tools/widl/widl 2>/dev/null || echo 'MISSING')"
          echo "winebuild: $(ls -la /opt/wine-host/tools/winebuild/winebuild 2>/dev/null || echo 'MISSING')"

          # Symlink the whole tools dir so --with-wine64=../build-x64 can find them
          rm -rf build-x64/tools
          ln -sf /opt/wine-host/tools build-x64/tools

          mkdir build-i386 && cd build-i386
          CC=gcc CXX=g++ ../wine-${WINE_VERSION}/configure \
            --with-wine64=../build-x64 \
            --disable-tests \
            --prefix=/tmp/wine-x64-out \
            --without-x \
            --without-wayland \
            --without-dbus \
            --without-pulse \
            --without-alsa \
            --without-cups \
            --without-sane \
            --without-v4l2 \
            --without-opencl \
            --without-pcap \
            --without-netapi \
            --without-krb5 \
            --without-capi \
            --without-gnutls \
            --without-unwind \
            --without-freetype \
            CROSSCC="i686-w64-mingw32-gcc" \
            CROSSCXX="i686-w64-mingw32-g++" \
            CROSSCFLAGS="-Wno-implicit-function-declaration -Wno-incompatible-function-pointer-types -Wno-int-conversion"

      - name: Patch generated Makefile (i386)
        run: |
          python3 << 'PYEOF'
          import re
          mf = 'build-i386/Makefile'
          c = open(mf).read()
          orig = c
          c = re.sub(r'\s*-Wl,-z,defs\b', '', c)
          c = re.sub(r'\s*dlls/wineandroid\.drv/wine-debug\.apk\b', '', c)
          if c != orig:
              open(mf, 'w').write(c)
              print('Patched build-i386/Makefile: -Wl,-z,defs + wine-debug.apk removed')
          else:
              print('build-i386/Makefile: nothing to patch (OK)')
          PYEOF

      - name: Build Wine i386 PE DLLs (WoW64)
        env:
          WINE_BUILD_DIR: /opt/wine-host
        run: |
          cd build-i386
          make -j$(nproc)

      - name: Install Wine i386 PE DLLs
        run: |
          cd build-i386
          make install
          echo "=== i386-windows DLLs ==="
          # Wine may install to $prefix/lib/wine/i386-windows (no arch subdir) or
          # directly under $prefix/x86_64/lib/wine/i386-windows/. Check both.
          I386_TOP=/tmp/wine-x64-out/lib/wine/i386-windows
          I386_X64=/tmp/wine-x64-out/x86_64/lib/wine/i386-windows
          if [[ -d "$I386_X64" ]]; then
            echo "i386-windows already in x86_64 subtree: $(ls "$I386_X64" | wc -l) files"
          elif [[ -d "$I386_TOP" ]]; then
            echo "Copying $(ls "$I386_TOP" | wc -l) i386-windows DLLs into x86_64 subtree..."
            mkdir -p "$I386_X64"
            cp -a "$I386_TOP/." "$I386_X64/"
            echo "Done: $(ls "$I386_X64" | wc -l) files in $I386_X64"
          else
            echo "ERROR: i386-windows DLLs not found after install. Full tree:"
            find /tmp/wine-x64-out -name "*.dll" -path "*/i386*" 2>/dev/null | head -5 || echo "(none)"
            find /tmp/wine-x64-out -maxdepth 5 -type d 2>/dev/null | head -20
            exit 1
          fi

      - name: Package as GameHub container
        run: |
          # Wine installs to $prefix/x86_64/ (multiarch layout).
          # share/ and include/ land at $prefix/ — merge into x86_64/ for package_container.sh.
          X64_SRC=/tmp/wine-x64-out/x86_64
          [[ -d /tmp/wine-x64-out/share   ]] && cp -a /tmp/wine-x64-out/share   "$X64_SRC/"
          [[ -d /tmp/wine-x64-out/include ]] && cp -a /tmp/wine-x64-out/include "$X64_SRC/"

          echo "=== $X64_SRC/bin ==="
          ls -la "$X64_SRC/bin/" 2>/dev/null || echo "(no bin dir)"
          echo "=== unix-side .so files ==="
          ls "$X64_SRC/lib/wine/x86_64-unix/" 2>/dev/null | grep "\.so$" | head -10
          echo "=== windows PE DLLs (sample) ==="
          ls "$X64_SRC/lib/wine/x86_64-windows/" 2>/dev/null | grep "\.dll$" | head -10 || echo "missing"
          echo "=== i386-windows PE DLLs ==="
          ls "$X64_SRC/lib/wine/i386-windows/" 2>/dev/null | wc -l || echo "0 (missing!)"

          chmod +x scripts/package_container.sh
          ./scripts/package_container.sh x64 "$X64_SRC" wine_${WINE_VERSION}

      - name: Generate proper Wine prefix (sub_data) from wine_10.0 template
        # wine_10.0's sub_data has registry hives + symlinks needed for container init.
        # We reuse it as-is — Wine 11.0 now ships i386-windows DLLs so syswow64
        # symlinks pointing to i386-windows remain valid.
        run: |
          WINE_VER="${WINE_VERSION}"
          MAIN_MD5=$(md5sum "wine_${WINE_VER}.tar.zst" | cut -d' ' -f1)
          OLD_SUB="${MAIN_MD5}.tzst"

          echo "Downloading wine_10.0 prefix template..."
          wget -q -O /tmp/wine10_sub.tzst "$WINE10_SUB_URL"

          echo "Processing prefix — keeping i386-windows symlinks (WoW64 DLLs now present)..."
          mkdir -p /tmp/prefix_work
          cd /tmp/prefix_work
          zstd -d -c /tmp/wine10_sub.tzst | tar -x

          echo "Repacking prefix..."
          tar --use-compress-program="zstd -19 -T0" -cf "/tmp/${OLD_SUB}" wine/
          cd -
          mv "/tmp/${OLD_SUB}" "./${OLD_SUB}"

          NEW_SUB_MD5=$(md5sum "./${OLD_SUB}" | cut -d' ' -f1)
          NEW_SUB_SIZE=$(stat -c%s "./${OLD_SUB}")
          echo "New sub_data: ${OLD_SUB} (${NEW_SUB_SIZE} bytes, md5=${NEW_SUB_MD5})"

          # Update containers_entry JSON with correct sub_data info
          python3 << PYEOF
          import json, glob

          import re as _re
          for entry_file in glob.glob('./containers_entry_wine_*.json'):
              if _re.search(r'arm64x', entry_file):
                  continue  # skip arm64x entry
              with open(entry_file) as f:
                  entry = json.load(f)
              entry['sub_data']['sub_file_name'] = '${OLD_SUB}'
              entry['sub_data']['sub_download_url'] = 'https://github.com/The412Banner/gamehub-wine/releases/download/Containers/${OLD_SUB}'
              entry['sub_data']['sub_file_md5'] = '${NEW_SUB_MD5}'
              with open(entry_file, 'w') as f:
                  json.dump(entry, f, indent=2)
              print(f'Updated {entry_file}')
          PYEOF

          echo "=== Updated containers_entry ==="
          cat containers_entry_wine_${WINE_VER}.json

      - name: Upload container artifacts
        uses: actions/upload-artifact@v4
        with:
          name: container-x64
          path: |
            wine_${{ env.WINE_VERSION }}.tar.zst
            *.tzst
            containers_entry_*.json
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Build arm64X: aarch64-linux-android (native ARM64 — no emulation)
  # Uses X11 backend (winex11.so) — imagefs provides native ARM64 libX11
  # Uses llvm-mingw for aarch64-w64-mingw32 cross-compiler (not in Ubuntu apt)
  # ──────────────────────────────────────────────────────────────────────────
  build-arm64x:
    runs-on: ubuntu-24.04
    needs: build-host-tools
    if: inputs.framework == 'arm64x' || inputs.framework == 'both'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            flex bison gettext make pkg-config libtool \
            gcc-mingw-w64-i686 \
            mingw-w64-tools \
            libx11-dev libxext-dev \
            zstd

      - name: Install llvm-mingw (provides aarch64-w64-mingw32 cross-compiler)
        run: |
          LLVM_MINGW_VER=20241217
          wget -q "https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VER}/llvm-mingw-${LLVM_MINGW_VER}-ucrt-ubuntu-20.04-x86_64.tar.xz"
          tar -xf "llvm-mingw-${LLVM_MINGW_VER}-ucrt-ubuntu-20.04-x86_64.tar.xz" -C /opt
          echo "/opt/llvm-mingw-${LLVM_MINGW_VER}-ucrt-ubuntu-20.04-x86_64/bin" >> $GITHUB_PATH

      - name: Download Wine source
        run: |
          wget -q "https://dl.winehq.org/wine/source/${WINE_VERSION%%.*}.0/wine-${WINE_VERSION}.tar.xz"
          tar -xf "wine-${WINE_VERSION}.tar.xz"

      - name: Download host tools artifact
        uses: actions/download-artifact@v4
        with:
          name: wine-host-tools
          path: /opt/wine-host

      - name: Fix host tools permissions
        # Artifacts don't preserve execute bits — restore them
        run: chmod -R +x /opt/wine-host/tools

      - name: Set up Android NDK toolchain (aarch64)
        run: |
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> $GITHUB_ENV
          $TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang --version

      - name: Create Android aarch64 stubs for X11 libraries
        # imagefs provides native ARM64 libX11/libXext at runtime.
        # Create stubs from host X11 symbols for build-time linking.
        # Only copy X11/ headers (not all of /usr/include) to avoid Ubuntu glibc
        # header contamination when building with Android NDK clang.
        run: |
          mkdir -p /opt/android-x11-stubs-arm64/include
          cp -r /usr/include/X11 /opt/android-x11-stubs-arm64/include/
          NDK_CC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${API_LEVEL}-clang"

          python3 << 'PYEOF'
          import subprocess, os, glob

          ndk_cc = os.environ['NDK'] + f'/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android{os.environ["API_LEVEL"]}-clang'

          def make_stub(host_lib_pattern, soname, out_path):
              candidates = glob.glob(host_lib_pattern)
              host_lib = None
              for c in candidates:
                  if os.path.exists(c):
                      host_lib = c
                      break
              if not host_lib:
                  print(f'WARNING: host lib not found for {soname}, creating minimal stub')
                  symbols = ['XOpenDisplay']
              else:
                  result = subprocess.run(['nm', '-D', '--defined-only', host_lib],
                                        capture_output=True, text=True)
                  symbols = set()
                  for line in result.stdout.split('\n'):
                      parts = line.strip().split()
                      if len(parts) >= 3 and parts[-2] in ('T', 'W'):
                          sym = parts[-1]
                          if not sym.startswith('_Z'):
                              symbols.add(sym)
                  print(f'Found {len(symbols)} symbols in {host_lib}')

              stub_s = f'/tmp/stub_arm64_{soname}.s'
              with open(stub_s, 'w') as f:
                  for sym in sorted(symbols):
                      f.write(f'.global {sym}\n')
                      f.write(f'.type {sym}, %function\n')
                      f.write(f'{sym}:\n')
                      f.write(f'  ret\n\n')

              result = subprocess.run([ndk_cc, '-shared', '-fPIC',
                                      f'-Wl,-soname,{soname}',
                                      '-o', out_path, stub_s],
                                     capture_output=True, text=True)
              if result.returncode == 0:
                  print(f'Created {out_path}: {os.path.getsize(out_path)} bytes')
              else:
                  print(f'ERROR: {result.stderr[:300]}')
                  raise RuntimeError(f'Failed to create stub for {soname}')

          make_stub('/usr/lib/x86_64-linux-gnu/libX11.so*',
                    'libX11.so', '/opt/android-x11-stubs-arm64/libX11.so')
          make_stub('/usr/lib/x86_64-linux-gnu/libXext.so*',
                    'libXext.so', '/opt/android-x11-stubs-arm64/libXext.so')
          PYEOF

          # Create pkg-config files
          mkdir -p /opt/android-x11-stubs-arm64/pkgconfig
          printf 'prefix=/opt/android-x11-stubs-arm64\nexec_prefix=${prefix}\nlibdir=${exec_prefix}\nincludedir=/usr/include\n\nName: X11\nDescription: X Library stub for Android NDK cross-compilation\nVersion: 1.8.0\nLibs: -L${libdir} -lX11\nCflags: -I${includedir}\n' \
            > /opt/android-x11-stubs-arm64/pkgconfig/x11.pc
          printf 'prefix=/opt/android-x11-stubs-arm64\nexec_prefix=${prefix}\nlibdir=${exec_prefix}\nincludedir=/usr/include\n\nName: Xext\nDescription: Misc X Extension Library stub for Android NDK cross-compilation\nVersion: 1.3.5\nRequires: x11\nLibs: -L${libdir} -lXext\nCflags: -I${includedir}\n' \
            > /opt/android-x11-stubs-arm64/pkgconfig/xext.pc
          echo "ARM64 X11 stubs created:"
          ls -la /opt/android-x11-stubs-arm64/

      - name: Build FreeType for Android aarch64
        run: |
          wget -q "https://download.savannah.gnu.org/releases/freetype/freetype-${FREETYPE_VERSION}.tar.xz" || \
            wget -q "https://sourceforge.net/projects/freetype/files/freetype2/${FREETYPE_VERSION}/freetype-${FREETYPE_VERSION}.tar.xz/download" \
              -O "freetype-${FREETYPE_VERSION}.tar.xz"
          tar xf "freetype-${FREETYPE_VERSION}.tar.xz"
          mkdir freetype-build && cd freetype-build
          ../freetype-${FREETYPE_VERSION}/configure \
            --host=aarch64-linux-android \
            --prefix=/opt/freetype-arm64 \
            --without-zlib \
            --without-bzip2 \
            --without-png \
            --without-harfbuzz \
            --without-brotli \
            CC="$CC" \
            AR="$AR" \
            RANLIB="$RANLIB"
          make -j$(nproc)
          sudo make install
          echo "FREETYPE_CFLAGS=-I/opt/freetype-arm64/include/freetype2" >> $GITHUB_ENV
          echo "FREETYPE_LIBS=-L/opt/freetype-arm64/lib -lfreetype" >> $GITHUB_ENV

      - name: Patch Wine source for Android NDK compilation
        run: |
          python3 << 'PYEOF'
          import re, os

          ver_local = os.environ.get('WINE_VERSION', '11.0')

          # --- server/thread.c: add sched.h for cpu_set_t ---
          tc = f'wine-{ver_local}/server/thread.c'
          try:
              c = open(tc).read()
              if 'cpu_set_t' in c and '<sched.h>' not in c:
                  p = re.sub(r'(#include\s+[<"][^\n]+\n)',
                             r'\1#include <sched.h>  /* Android NDK: cpu_set_t */\n',
                             c, count=1)
                  open(tc, 'w').write(p)
                  print('Patched server/thread.c: added sched.h for cpu_set_t')
              else:
                  print('server/thread.c: sched.h already present or no cpu_set_t usage')
          except Exception as e:
              print(f'Error patching server/thread.c: {e}')

          # --- wineandroid.drv/android.h: remove BOOL fullscreen parameter ---
          ah = f'wine-{ver_local}/dlls/wineandroid.drv/android.h'
          try:
              c = open(ah).read()
              orig = c
              c = re.sub(r',\s*BOOL\s+fullscreen\b', '', c)
              if c != orig:
                  open(ah, 'w').write(c)
                  print('Patched android.h: removed BOOL fullscreen parameter')
              else:
                  print('android.h: BOOL fullscreen not found (OK)')
          except Exception as e:
              print(f'Error patching android.h: {e}')
          PYEOF

      - name: Configure Wine (arm64x Android — X11 backend)
        run: |
          mkdir build-arm64x && cd build-arm64x
          ../wine-${WINE_VERSION}/configure \
            --host=aarch64-linux-android \
            --with-wine-tools=/opt/wine-host \
            --enable-win64 \
            --with-x \
            --x-includes=/opt/android-x11-stubs-arm64/include \
            --x-libraries=/opt/android-x11-stubs-arm64 \
            --without-xcomposite \
            --without-xfixes \
            --without-xinerama \
            --without-xinput \
            --without-xinput2 \
            --without-xrandr \
            --without-xrender \
            --without-xshape \
            --without-xshm \
            --without-xxf86vm \
            --without-wayland \
            --without-dbus \
            --without-pulse \
            --without-alsa \
            --without-cups \
            --without-sane \
            --without-v4l2 \
            --without-opencl \
            --without-pcap \
            --without-netapi \
            --without-krb5 \
            --without-capi \
            --disable-tests \
            --prefix=/tmp/wine-arm64x-out \
            CC="$CC" \
            CXX="$CXX" \
            AR="$AR" \
            RANLIB="$RANLIB" \
            CROSSCC="aarch64-w64-mingw32-clang" \
            CROSSCXX="aarch64-w64-mingw32-clang++" \
            FREETYPE_CFLAGS="$FREETYPE_CFLAGS" \
            FREETYPE_LIBS="$FREETYPE_LIBS" \
            CFLAGS="-D_GNU_SOURCE -include strings.h -Wno-implicit-function-declaration -Wno-incompatible-function-pointer-types -Wno-int-conversion" \
            CROSSCFLAGS="-Wno-implicit-function-declaration -Wno-incompatible-function-pointer-types -Wno-int-conversion" \
            LDFLAGS="-L/opt/android-x11-stubs-arm64 -Wl,--allow-shlib-undefined"

      - name: Patch generated Makefile (arm64x)
        run: |
          python3 << 'PYEOF'
          import re
          mf = 'build-arm64x/Makefile'
          c = open(mf).read()
          orig = c
          c = re.sub(r'\s*-Wl,-z,defs\b', '', c)
          c = re.sub(r'\s*dlls/wineandroid\.drv/wine-debug\.apk\b', '', c)
          if c != orig:
              open(mf, 'w').write(c)
              print(f'Patched build-arm64x/Makefile: -Wl,-z,defs + wine-debug.apk removed')
          else:
              print('build-arm64x/Makefile: nothing to patch (OK)')
          PYEOF

      - name: Build Wine (arm64x)
        env:
          # Tell wrc where to find nls/locale.nls from the downloaded host tools
          WINE_BUILD_DIR: /opt/wine-host
        run: |
          cd build-arm64x
          make -j$(nproc)

      - name: Install Wine (arm64x)
        run: |
          cd build-arm64x
          # Pass PATH so make can find aarch64-w64-mingw32-clang from llvm-mingw during install
          PATH="$PATH" make install
          cd ..

          echo "=== build-arm64x/loader contents ==="
          ls -la build-arm64x/loader/ 2>/dev/null | head -30 || echo "loader dir missing"
          echo "=== build-arm64x/server contents ==="
          ls -la build-arm64x/server/ 2>/dev/null | head -10 || echo "server dir missing"
          echo "=== arm64-v8a unix-side libs ==="
          ls /tmp/wine-arm64x-out/arm64-v8a/lib/wine/aarch64-unix/ 2>/dev/null | grep "\.so$" | head -10 || echo "missing"

          # Wine Android NDK cross-compile does NOT install loader/wine via make install.
          # Detect install layout and copy executables manually.
          if [[ -d /tmp/wine-arm64x-out/arm64-v8a ]]; then
            INST_BIN=/tmp/wine-arm64x-out/arm64-v8a/bin
          else
            INST_BIN=/tmp/wine-arm64x-out/bin
          fi
          mkdir -p "$INST_BIN"

          for candidate in build-arm64x/loader/wine build-arm64x/loader/wine64; do
            if [[ -f "$candidate" ]]; then
              cp "$candidate" "$INST_BIN/wine"
              echo "Installed $candidate → $INST_BIN/wine"
              file "$INST_BIN/wine" || true
              break
            fi
          done

          for candidate in build-arm64x/server/wineserver; do
            if [[ -f "$candidate" ]]; then
              cp "$candidate" "$INST_BIN/wineserver"
              echo "Installed $candidate → $INST_BIN/wineserver"
            fi
          done

          echo "=== $INST_BIN ==="
          ls -la "$INST_BIN/" 2>/dev/null || echo "(empty)"

      - name: Package as GameHub container
        run: |
          # Determine actual install prefix layout
          if [[ -d /tmp/wine-arm64x-out/arm64-v8a/lib/wine ]]; then
            ARM_SRC=/tmp/wine-arm64x-out/arm64-v8a
            [[ -d /tmp/wine-arm64x-out/share   ]] && cp -a /tmp/wine-arm64x-out/share   "$ARM_SRC/"
            [[ -d /tmp/wine-arm64x-out/include ]] && cp -a /tmp/wine-arm64x-out/include "$ARM_SRC/"
          elif [[ -d /tmp/wine-arm64x-out/lib/wine ]]; then
            ARM_SRC=/tmp/wine-arm64x-out
          else
            echo "ERROR: could not find arm64x wine libs. Full tree:"
            find /tmp/wine-arm64x-out -maxdepth 5 2>/dev/null | head -40
            exit 1
          fi

          echo "=== $ARM_SRC/bin ==="
          ls -la "$ARM_SRC/bin/" 2>/dev/null || echo "(no bin dir)"
          echo "=== aarch64-unix .so files ==="
          ls "$ARM_SRC/lib/wine/aarch64-unix/" 2>/dev/null | grep "\.so$" | head -10

          chmod +x scripts/package_container.sh
          ./scripts/package_container.sh arm64x "$ARM_SRC" wine_${WINE_VERSION}_arm64x

      - name: Generate proper Wine prefix (sub_data) from wine_10.0 template
        run: |
          WINE_VER="${WINE_VERSION}"
          MAIN_MD5=$(md5sum "wine_${WINE_VER}_arm64x.tar.zst" | cut -d' ' -f1)
          OLD_SUB="${MAIN_MD5}.tzst"

          echo "Downloading wine_10.0 prefix template..."
          wget -q -O /tmp/wine10_sub.tzst "$WINE10_SUB_URL"

          echo "Processing prefix — removing i386-windows symlinks..."
          mkdir -p /tmp/prefix_work_arm64
          cd /tmp/prefix_work_arm64
          zstd -d -c /tmp/wine10_sub.tzst | tar -x

          # Remove symlinks targeting i386-windows (Wine 11 has no 32-bit DLLs)
          find . -type l | while IFS= read -r link; do
            target=$(readlink "$link")
            if echo "$target" | grep -q "i386-windows"; then
              echo "  Removing: $link -> $target"
              rm "$link"
            fi
          done

          echo "Repacking prefix..."
          tar --use-compress-program="zstd -19 -T0" -cf "/tmp/${OLD_SUB}" wine/
          cd -
          mv "/tmp/${OLD_SUB}" "./${OLD_SUB}"

          NEW_SUB_MD5=$(md5sum "./${OLD_SUB}" | cut -d' ' -f1)
          NEW_SUB_SIZE=$(stat -c%s "./${OLD_SUB}")
          echo "New sub_data: ${OLD_SUB} (${NEW_SUB_SIZE} bytes, md5=${NEW_SUB_MD5})"

          # Update containers_entry JSON
          python3 << PYEOF
          import json, glob

          for entry_file in glob.glob('./containers_entry_wine_*_arm64x.json'):
              with open(entry_file) as f:
                  entry = json.load(f)
              entry['sub_data']['sub_file_name'] = '${OLD_SUB}'
              entry['sub_data']['sub_download_url'] = 'https://github.com/The412Banner/gamehub-wine/releases/download/Containers/${OLD_SUB}'
              entry['sub_data']['sub_file_md5'] = '${NEW_SUB_MD5}'
              with open(entry_file, 'w') as f:
                  json.dump(entry, f, indent=2)
              print(f'Updated {entry_file}')
          PYEOF

          echo "=== Updated containers_entry ==="
          cat containers_entry_wine_${WINE_VER}_arm64x.json

      - name: Upload container artifacts
        uses: actions/upload-artifact@v4
        with:
          name: container-arm64x
          path: |
            wine_${{ env.WINE_VERSION }}_arm64x.tar.zst
            *.tzst
            containers_entry_*.json
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Upload both containers to the Containers release
  # ──────────────────────────────────────────────────────────────────────────
  upload-release:
    runs-on: ubuntu-24.04
    needs: [build-x64, build-arm64x]
    permissions:
      contents: write
    if: |
      always() &&
      inputs.upload_release == true &&
      (needs.build-x64.result == 'success' || needs.build-x64.result == 'skipped') &&
      (needs.build-arm64x.result == 'success' || needs.build-arm64x.result == 'skipped')

    steps:
      - name: Download x64 artifact
        if: inputs.framework == 'x64' || inputs.framework == 'both'
        uses: actions/download-artifact@v4
        with:
          name: container-x64
          path: ./upload

      - name: Download arm64x artifact
        if: inputs.framework == 'arm64x' || inputs.framework == 'both'
        uses: actions/download-artifact@v4
        with:
          name: container-arm64x
          path: ./upload

      - name: Ensure Containers release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view Containers --repo ${{ github.repository }} 2>/dev/null || \
            gh release create Containers \
              --repo ${{ github.repository }} \
              --title "Containers" \
              --notes "Wine/Proton container files for GameHub/BannerHub" \
              --prerelease

      - name: Upload container files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -lh ./upload/
          gh release upload Containers ./upload/*.tar.zst ./upload/*.tzst \
            --repo ${{ github.repository }} \
            --clobber

      - name: Print containers.json entries
        run: |
          echo "=== Paste these entries into bannerhub-api/data/containers.json ==="
          cat ./upload/containers_entry_*.json
